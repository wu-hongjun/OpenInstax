site_name: InstantLink
site_description: Open-source Rust CLI and macOS 15+ app for Fujifilm Instax Link printers via BLE
site_url: https://instantlink.hongjunwu.com/
repo_url: https://github.com/wu-hongjun/InstantLink
repo_name: wu-hongjun/InstantLink

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
  - Reference:
      - CLI: reference/cli.md
      - Protocol: reference/protocol.md
      - FFI: reference/ffi.md
  - Development:
      - Architecture: development/architecture.md
      - Contributing: development/contributing.md
      - Reverse Engineering: development/reverse-engineering.md
  - Plans:
      - Plan 001 Full-Stack Scaffold: plans/001-full-stack-scaffold.md
      - Plan 002 CI/CD Setup: plans/002-ci-cd-setup.md
      - Plan 003 GitHub Pages: plans/003-github-pages.md
      - Plan 004 App Bundle and Release: plans/004-app-bundle-and-release.md
      - Plan 005 Mock Transport Device Tests: plans/005-mock-transport-device-tests.md
      - Plan 006 Overlay System: plans/006-overlay-system.md
      - Plan 007 UI/UX Pass 1: plans/007-ui-ux-pass-1.md
      - Plan 008 UI/UX Pass 2: plans/008-ui-ux-pass-2.md
      - Plan 009 Repo Simplification Audit: plans/009-repo-simplification-audit.md
      - Plan 010 UI/UX Pass 3: plans/010-ui-ux-pass-3.md
      - Plan 011 macOS Coordinator Extraction: plans/011-macos-coordinator-extraction.md
      - Plan 012 macOS 15 Baseline and Liquid Glass Adoption: plans/012-macos-15-liquid-glass-adoption.md
      - Plan 013 FFI Connection Stage Callbacks: plans/013-ffi-connection-stage-callbacks.md
      - Plan 014 Printer LED Print Phase Feedback: plans/014-printer-led-print-feedback.md
      - Plan 015 FFI Callback Safety and Concurrency: plans/015-ffi-callback-safety.md
      - Plan 016 Transport Command Serialization and Protocol Hardening: plans/016-transport-command-serialization.md
      - Plan 017 Reconnect Fallback and Recovery UX: plans/017-reconnect-fallback-behavior.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
