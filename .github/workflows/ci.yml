name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: macOS Core Tests
        run: bash scripts/test-macos.sh

      - name: Localization Check
        run: python3 scripts/check-localizations.py

      - name: Build
        run: cargo build --workspace

  coverage:
    name: Rust Coverage
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - name: Coverage Gate
        run: cargo llvm-cov --workspace --summary-only --fail-under-lines 60

      - name: Save LCOV Report
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov --workspace --lcov --output-path target/llvm-cov/lcov.info

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-lcov
          path: target/llvm-cov/lcov.info

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: rustsec/audit-check@v1.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install docs dependencies
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build --strict
