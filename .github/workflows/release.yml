name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS ARM64
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --workspace --release

      - name: Package CLI
        run: |
          TAG="${GITHUB_REF_NAME}"
          CLI_DIR="OpenInstax-CLI-${TAG}"
          mkdir -p "${CLI_DIR}"
          cp target/release/openinstax "${CLI_DIR}/"
          zip -r "OpenInstax-CLI-${TAG}.zip" "${CLI_DIR}/"

      - name: Package FFI artifacts
        run: |
          TAG="${GITHUB_REF_NAME}"
          FFI_DIR="OpenInstax-FFI-${TAG}"
          mkdir -p "${FFI_DIR}"

          cp target/release/libopeninstax_ffi.a     "${FFI_DIR}/" 2>/dev/null || true
          cp target/release/libopeninstax_ffi.dylib  "${FFI_DIR}/" 2>/dev/null || true
          cp crates/openinstax-ffi/include/openinstax.h  "${FFI_DIR}/" 2>/dev/null || true

          zip -r "OpenInstax-FFI-${TAG}.zip" "${FFI_DIR}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            OpenInstax-CLI-*.zip
            OpenInstax-FFI-*.zip
