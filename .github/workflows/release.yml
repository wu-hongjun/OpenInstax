name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS ARM64
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install tools
        run: brew install create-dmg

      - name: Build Rust workspace
        run: cargo build --workspace --release

      - name: Build .app bundle and DMG
        run: bash scripts/build-app.sh "${GITHUB_REF_NAME}"

      - name: Package CLI
        run: |
          TAG="${GITHUB_REF_NAME}"
          CLI_DIR="InstantLink-CLI-${TAG}"
          mkdir -p "${CLI_DIR}"
          cp target/release/instantlink "${CLI_DIR}/"
          zip -r "InstantLink-CLI-${TAG}.zip" "${CLI_DIR}/"

      - name: Package FFI artifacts
        run: |
          TAG="${GITHUB_REF_NAME}"
          FFI_DIR="InstantLink-FFI-${TAG}"
          mkdir -p "${FFI_DIR}"

          cp target/release/libinstantlink_ffi.a     "${FFI_DIR}/" 2>/dev/null || true
          cp target/release/libinstantlink_ffi.dylib  "${FFI_DIR}/" 2>/dev/null || true
          cp crates/instantlink-ffi/include/instantlink.h  "${FFI_DIR}/" 2>/dev/null || true

          zip -r "InstantLink-FFI-${TAG}.zip" "${FFI_DIR}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            InstantLink-*.dmg
            InstantLink-CLI-*.zip
            InstantLink-FFI-*.zip
