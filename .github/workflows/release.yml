name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build macOS ARM64
    runs-on: macos-latest
    env:
      RUST_TARGET: aarch64-apple-darwin
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install tools
        run: brew install create-dmg

      - name: Build Rust workspace
        run: cargo build --workspace --release --target "$RUST_TARGET"

      - name: Generate FFI header
        run: INSTANTLINK_UPDATE_HEADER=1 cargo build --release -p instantlink-ffi --target "$RUST_TARGET"

      - name: Build .app bundle and DMG
        run: RUST_TARGET="$RUST_TARGET" bash scripts/build-app.sh "${GITHUB_REF_NAME}"

      - name: Package CLI
        run: |
          TAG="${GITHUB_REF_NAME}"
          CLI_DIR="InstantLink-CLI-${TAG}"
          mkdir -p "${CLI_DIR}"
          cp "target/${RUST_TARGET}/release/instantlink" "${CLI_DIR}/"
          zip -r "InstantLink-CLI-${TAG}.zip" "${CLI_DIR}/"

      - name: Package FFI artifacts
        run: |
          TAG="${GITHUB_REF_NAME}"
          FFI_DIR="InstantLink-FFI-${TAG}"
          mkdir -p "${FFI_DIR}"

          cp "target/${RUST_TARGET}/release/libinstantlink_ffi.a" "${FFI_DIR}/"
          cp "target/${RUST_TARGET}/release/libinstantlink_ffi.dylib" "${FFI_DIR}/"
          cp crates/instantlink-ffi/include/instantlink.h "${FFI_DIR}/"

          zip -r "InstantLink-FFI-${TAG}.zip" "${FFI_DIR}/"

      - name: Generate SHA-256 checksums
        run: |
          TAG="${GITHUB_REF_NAME}"
          shasum -a 256 "InstantLink-${TAG}.dmg"          > "InstantLink-${TAG}.dmg.sha256"
          shasum -a 256 "InstantLink-CLI-${TAG}.zip"      > "InstantLink-CLI-${TAG}.zip.sha256"
          shasum -a 256 "InstantLink-FFI-${TAG}.zip"      > "InstantLink-FFI-${TAG}.zip.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            InstantLink-*.dmg
            InstantLink-*.dmg.sha256
            InstantLink-CLI-*.zip
            InstantLink-CLI-*.zip.sha256
            InstantLink-FFI-*.zip
            InstantLink-FFI-*.zip.sha256
